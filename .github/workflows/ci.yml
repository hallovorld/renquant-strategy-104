name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: renquant-strategy-104
      - uses: actions/checkout@v4
        with:
          repository: hallovorld/renquant-common
          ref: codex/shared-training-run-recorder
          path: renquant-common
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test tools
        run: python -m pip install -e renquant-common -e renquant-strategy-104 pytest
      - name: Test
        working-directory: renquant-strategy-104
        run: make test
